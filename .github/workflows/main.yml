name: Build FilzaJailedDS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Cache iOS SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos/sdks
          key: ios-sdk-15.0

      - name: Download iOS SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p $THEOS/sdks
          # Clone to a temporary directory to avoid Git "directory not empty" errors
          git clone --quiet --depth=1 https://github.com/theos/sdks.git temp_sdks
          
          # Use rsync to preserve symlinks and merge directories without errors
          rsync -a temp_sdks/ $THEOS/sdks/
          
          # Clean up the temp clone
          rm -rf temp_sdks

      - name: Build Package
        run: |
          # Use the $THEOS path established by the action
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos
          THEOS_DEVICE_IP: "" 
          ARCHS: "arm64 arm64e"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilzaApplySandboxExt-Deb
          path: packages/*.deb
