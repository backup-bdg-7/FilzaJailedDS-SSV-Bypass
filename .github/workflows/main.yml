name: Build FilzaJailedDS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13 # Using macOS 13 for better compatibility with older iOS SDKs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: theos/setup-theos@v1

      - name: Cache iOS SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}/sdks
          key: ios-sdk-15.0

      - name: Download iOS SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone --quiet --depth=1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build Package
        run: |
          # We use the $THEOS provided by the setup-theos action
          make package FINALPACKAGE=1
        env:
          THEOS_DEVICE_IP: "" # Ensures no SSH attempt
          ARCHS: "arm64 arm64e"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilzaApplySandboxExt-Deb
          path: packages/*.deb
