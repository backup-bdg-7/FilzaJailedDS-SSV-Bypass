name: Build FilzaJailedDS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: theos/setup-theos@v1

      - name: Build Package
        # The environment variables are moved to their own 'env' block
        # and we use the $THEOS variable provided by the setup action
        run: make package FINALPACKAGE=1
        env:
          ARCHS: arm64 arm64e
          # THEOS is automatically set by the setup-theos action

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilzaApplySandboxExt-Deb
          path: packages/*.deb
