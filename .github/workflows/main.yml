name: Build FilzaJailedDS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: theos/setup-theos@master # Using the master branch reference for the official repo

      - name: Cache iOS SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}/sdks
          key: ios-sdk-15.0

      - name: Download iOS SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip
          mv sdks-master/* $THEOS/sdks/
          rm -rf sdks-master master.zip

      - name: Build Package
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS_DEVICE_IP: "" 
          ARCHS: "arm64 arm64e"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilzaApplySandboxExt-Deb
          path: packages/*.deb
