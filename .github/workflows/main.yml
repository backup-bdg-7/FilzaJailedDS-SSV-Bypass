name: Build FilzaJailedDS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Cache iOS SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          # Using the standard path the action sets up
          path: ${{ github.workspace }}/theos/sdks
          key: ios-sdk-15.0

      - name: Download iOS SDK
        # Only run if cache missed AND the directory doesn't already have the SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p $THEOS/sdks
          # Using a temporary clone to avoid the "directory not empty" error
          git clone --quiet --depth=1 https://github.com/theos/sdks.git temp_sdks
          cp -rn temp_sdks/* $THEOS/sdks/
          rm -rf temp_sdks

      - name: Build Package
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS_DEVICE_IP: "" 
          ARCHS: "arm64 arm64e"
          # Explicitly point to the local theos directory
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilzaApplySandboxExt-Deb
          path: packages/*.deb
